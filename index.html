<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vamus Decorar | Soluções Profissionais em Acústica</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Montserrat', sans-serif; margin: 0; padding: 0; }
        .error-box { background: #fee; border: 2px solid #c33; color: #c33; padding: 20px; margin: 20px; border-radius: 8px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script>
        console.log('✅ Iniciando aplicação...');
        console.log('React versão:', React.version);

        window.APP_LOGS = [];
        function log(level, msg, data) {
            const entry = { timestamp: new Date().toISOString(), level, msg, data };
            window.APP_LOGS.push(entry);
            console[level.toLowerCase() === 'error' ? 'error' : 'log'](
                `[${level}] ${msg}`, data || ''
            );
        }

        window.addEventListener('error', (e) => {
            log('ERROR', 'Erro Global', { message: e.message });
            document.getElementById('root').innerHTML = `<div class="error-box"><h1>❌ Erro</h1><p>${e.message}</p></div>`;
        });

        try {
            const React_createElement = React.createElement;
            const ReactDOM_createRoot = ReactDOM.createRoot;

            const Header = () => React_createElement('header', { className: 'bg-white shadow-sm' },
                React_createElement('div', { className: 'max-w-7xl mx-auto px-4 py-6' },
                    React_createElement('h1', { className: 'text-3xl font-bold' }, '✅ Vamus Decorar'),
                    React_createElement('p', { className: 'text-gray-600 mt-2' }, 'Soluções Profissionais em Acústica')
                )
            );

            const Hero = () => React_createElement('section', { className: 'min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 py-12' },
                React_createElement('div', { className: 'max-w-7xl mx-auto px-4' },
                    React_createElement('div', { className: 'bg-green-50 border border-green-200 rounded-lg p-4 mb-6' },
                        React_createElement('h2', { className: 'text-lg font-semibold text-green-900' }, '✅ Status: Funcionando!'),
                        React_createElement('p', { className: 'text-green-700 text-sm' }, 'React renderizou com sucesso.')
                    ),
                    React_createElement('div', { className: 'grid grid-cols-1 md:grid-cols-2 gap-8' },
                        React_createElement('div', { className: 'bg-white p-8 rounded-lg shadow-lg' },
                            React_createElement('h2', { className: 'text-2xl font-bold mb-4' }, 'Qualidade Acústica'),
                            React_createElement('p', { className: 'text-gray-600' }, 'Soluções premium para isolamento e tratamento acústico.')
                        ),
                        React_createElement('div', { className: 'bg-white p-8 rounded-lg shadow-lg' },
                            React_createElement('h2', { className: 'text-2xl font-bold mb-4' }, 'Nossos Serviços'),
                            React_createElement('ul', { className: 'space-y-3 text-gray-600' },
                                React_createElement('li', null, '✓ Diagnóstico acústico'),
                                React_createElement('li', null, '✓ Instalação profissional'),
                                React_createElement('li', null, '✓ Consultoria especializada'),
                                React_createElement('li', null, '✓ Garantia estendida')
                            )
                        )
                    )
                )
            );

            const Footer = () => React_createElement('footer', { className: 'bg-gray-900 text-white p-6' },
                React_createElement('div', { className: 'max-w-7xl mx-auto text-center' },
                    React_createElement('p', { className: 'text-gray-400' }, '© 2024 Vamus Decorar')
                )
            );

            const App = () => React_createElement(React.Fragment, null,
                React_createElement(Header),
                React_createElement(Hero),
                React_createElement(Footer)
            );

            log('INFO', 'Renderizando...');
            const root = ReactDOM_createRoot(document.getElementById('root'));
            root.render(React_createElement(React.StrictMode, null, React_createElement(App)));
            log('SUCCESS', 'Aplicação renderizada!');

        } catch (error) {
            log('ERROR', 'Erro', error.toString());
            document.getElementById('root').innerHTML = `<div class="error-box"><h1>❌ Erro</h1><p>${error.message}</p></div>`;
            console.error(error);
        }
    </script>
</body>
</html>
